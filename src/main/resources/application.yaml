spring:
  application:
    name: saleslens

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/saleslens_db}
    username: ${DB_USERNAME:postgresadmin}
    password: ${DB_PASSWORD:adminpassword}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: shreyas
      password: shreyas

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    listener:
      auto-startup: true
      ack-mode: batch
    consumer:
      group-id: saleslens-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

jwt:
  secret: 'qncthC+iC9L41fl3ZkBPqoJpUD4joC1R75sjeg0yWWc='
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

server:
  port: 8080


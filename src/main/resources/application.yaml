spring:
  application:
    name: saleslens

  batch:
    job:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/saleslens_db}
    username: ${DB_USERNAME:postgresadmin}
    password: ${DB_PASSWORD:adminpassword}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    listener:
      auto-startup: true
      ack-mode: batch
    consumer:
      group-id: saleslens-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  task:
    scheduling:
      thread-name-prefix: "jdbc-scheduler-"
      pool:
        size: 4

# Default admin credentials (seeded by V18): admin / Admin123!
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-saleslens-local-development}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

server:
  port: 8080

langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_MODEL_NAME:qwen3.5:9b}

saleslens:
  batch:
    chunk-size: 50
    jdbc:
      poll-interval-ms: 60000
    streaming:
      poll-interval-ms: 30000
      window-seconds: 30
      source-cache-ttl-ms: 300000
  encryption:
    key: ${ENCRYPTION_KEY:change-me-in-production}
    salt: ${ENCRYPTION_SALT:deadbeefdeadbeef}
  kafka:
    stream-topic: sales.live
    stream-group-id: saleslens-live

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

